name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Minimal env to allow Next build/typecheck without real secrets.
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "ci"
      NEXT_PUBLIC_FIREBASE_APP_ID: "ci"
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "ci"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:4000"
      NEXT_PUBLIC_SITE_URL: "https://example.com"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Install backend
        run: npm --prefix backend ci

      - name: Guard browser Firestore imports
        run: npm run guard:no-browser-firestore

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Backend typecheck
        run: npm --prefix backend run typecheck

      - name: Backend tests
        run: npm --prefix backend test

      - name: Backend build
        run: npm --prefix backend run build
